<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js - Future City Tour</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; }
      body {
        background: #05060f;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #cfe9ff;
        cursor: crosshair;
      }
      .back {
        position: absolute; top: 14px; left: 18px; z-index: 11;
        color: #9fd4ff; text-decoration: none; font-size: 13px;
        border: 1px solid rgba(120,200,255,0.35);
        padding: 4px 10px; border-radius: 6px; backdrop-filter: blur(4px);
      }
      .back:hover { color: #fff; border-color: #fff; }

      #hint {
        position: absolute; top: 16px; width: 100%; text-align: center;
        z-index: 10; font-size: 12px; letter-spacing: 1px; color: #7fbfe6;
        pointer-events: none; text-shadow: 0 0 8px rgba(0,0,0,0.9);
      }
      #speed {
        position: absolute; top: 14px; right: 18px; z-index: 11;
        font-size: 12px; letter-spacing: 1px; color: #16e0ff;
        font-variant-numeric: tabular-nums;
        border: 1px solid rgba(22,224,255,0.35);
        padding: 4px 10px; border-radius: 6px; backdrop-filter: blur(4px);
        text-shadow: 0 0 10px rgba(22,224,255,0.5); pointer-events: none;
      }

      /* 하단 명소 HUD */
      #hud {
        position: absolute; left: 0; bottom: 0; width: 100%;
        padding: 28px 34px; z-index: 10; pointer-events: none;
        background: linear-gradient(to top, rgba(3,6,16,0.85), rgba(3,6,16,0));
      }
      #counter {
        font-size: 12px; letter-spacing: 3px; color: #16e0ff;
        text-shadow: 0 0 10px rgba(22,224,255,0.6);
      }
      #placeName {
        font-size: 38px; font-weight: 800; letter-spacing: 1px;
        margin: 4px 0 6px; color: #ffffff;
        text-shadow: 0 0 18px rgba(120,200,255,0.55);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      #placeDesc {
        font-size: 14px; color: #acc8e6; max-width: 560px; line-height: 1.5;
        transition: opacity 0.5s ease;
      }
      .swap { opacity: 0; transform: translateY(10px); }

      /* 진행 막대 */
      #bar { position: absolute; left: 34px; bottom: 20px; width: calc(100% - 68px);
        height: 2px; background: rgba(120,200,255,0.18); z-index: 11; }
      #barFill { height: 100%; width: 0%; background: #16e0ff;
        box-shadow: 0 0 10px #16e0ff; }

      #paused {
        position: absolute; inset: 0; display: none; z-index: 12;
        align-items: center; justify-content: center;
        font-size: 22px; letter-spacing: 4px; color: #fff;
        background: rgba(3,6,16,0.35); text-shadow: 0 0 14px #16e0ff;
      }
    </style>
    <script type="module" crossorigin src="/threejs/assets/future-BK8h74mS.js"></script>
    <link rel="modulepreload" crossorigin href="/threejs/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/threejs/assets/three.module-CoRjabV2.js">
    <link rel="modulepreload" crossorigin href="/threejs/assets/UnrealBloomPass-Clr8daqF.js">
  </head>
  <body>
    <a class="back" href="./">← 목록</a>
    <div id="hint">FUTURE CITY TOUR · ↑↓←→ 속도 · 스크롤 확대/축소 · 마우스 시선 · Space 정지</div>
    <div id="speed">■ SPEED +0%  ·  ZOOM 68°</div>

    <div id="hud">
      <div id="counter">STOP 01 / 06</div>
      <div id="placeName">—</div>
      <div id="placeDesc"></div>
    </div>
    <div id="bar"><div id="barFill"></div></div>

  </body>
</html>
